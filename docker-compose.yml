version: "3.9"

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: smart-ecommerce-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Express.js Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-ecommerce-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/smart-ecommerce
      MONGODB_URI: mongodb://mongodb:27017/smart-ecommerce
      CLIENT_URL: http://localhost:3000
      FASTAPI_URL: http://ai-service:8000
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_EXPIRE: 7d
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-internal-secret}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ── FastAPI AI Service ─────────────────────────────────────────────────────
  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: smart-ecommerce-ai
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/smart-ecommerce
      MONGODB_DB_NAME: smart-ecommerce
      FASTAPI_URL: http://ai-service:8000
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-internal-secret}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-models}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: smart-ecommerce-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_FASTAPI_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
