name: Deploy — Express.js API to Render

on:
  push:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  deploy:
    name: Trigger Render Deploy (API)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}" \
            -H "Content-Type: application/json" \
            || echo "Deploy hook not configured — skipping"
